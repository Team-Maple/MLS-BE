spring.application.name: mapleland-api
server:
  port: 8080
  shutdown: graceful

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui-maple/index.html
    disable-swagger-default-url: true

spring:
  lifecycle:
    timeout-per-shutdown-phase: 5s
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 1000
        order_updates: true
        order_inserts: true
        jdbc:
          batch_size: 1000

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:18080}
    address: ${MANAGEMENT_SERVER_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      show-components: never
  metrics:
    distribution:
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2s,5s,10s
  prometheus:
    metrics:
      export:
        enabled: true

jwt:
  secret: JTh4bhwwq69/Cj9gDLDXh8Riktoi9ndjD5T0cfHeSWkyC1aE7Xk2XpcDxwbk3Yyotj9d007VxNQuOYMjRoXMzg==

auradb:
  uri: ${AURADB_URI:}
  username: ${AURADB_USERNAME:}
  password: ${AURADB_PASSWORD:}
  database: ${AURADB_DATABASE:neo4j}

recommendation:
  # Keep the public v1 route on Aura until the MySQL schema preflight and v2 gate are approved.
  v1-engine: ${RECOMMENDATION_V1_ENGINE:AURA}
  # Keep the unauthenticated MySQL route dark until topology, schema, and rate-limit gates pass.
  v2-enabled: ${RECOMMENDATION_V2_ENABLED:false}
  query-timeout-seconds: ${RECOMMENDATION_QUERY_TIMEOUT_SECONDS:10}
---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/maple_resources
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update
batch:
  alrim-event:
    enabled: false
  auradb-keep-alive:
    enabled: false
logging:
  level:
    com.maple.api: DEBUG
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
batch:
  alrim-event:
    enabled: ${ALRIM_EVENT_BATCH_ENABLED:false}
  auradb-keep-alive:
    enabled: ${AURADB_KEEP_ALIVE_ENABLED:true}
management:
  prometheus:
    scrape-token: ${MANAGEMENT_SCRAPE_TOKEN}
logging:
  file:
    name: ${LOG_DIR:/workspace/logs}/mapleland-api.json
  structured:
    format:
      file: ecs
    ecs:
      service:
        environment: prod
        version: ${SERVICE_VERSION:unknown}
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_DIR:/workspace/logs}/mapleland-api.%d{yyyy-MM-dd}.%i.json
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 250MB
      clean-history-on-start: false
