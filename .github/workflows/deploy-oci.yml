name: Deploy Spring Boot App to Oracle Cloud

on:
  workflow_dispatch:

concurrency:
  group: deploy-oci
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  host-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    outputs:
      preflight_sha256: ${{ steps.contract.outputs.preflight_sha256 }}
      update_sha256: ${{ steps.contract.outputs.update_sha256 }}

    steps:
      - name: Checkout deployment contract
        uses: actions/checkout@v4

      - name: Resolve reviewed host contract checksums
        id: contract
        shell: bash
        run: |
          set -euo pipefail
          preflight_sha256="$(sha256sum deploy/observability/preflight-host.sh | awk '{print $1}')"
          update_sha256="$(sha256sum deploy/observability/update-api.sh | awk '{print $1}')"
          [[ $preflight_sha256 =~ ^[0-9a-f]{64}$ ]]
          [[ $update_sha256 =~ ^[0-9a-f]{64}$ ]]
          printf 'preflight_sha256=%s\n' "$preflight_sha256" >> "$GITHUB_OUTPUT"
          printf 'update_sha256=%s\n' "$update_sha256" >> "$GITHUB_OUTPUT"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify OCI host deployment contract
        uses: appleboy/ssh-action@v1.2.5
        env:
          EXPECTED_PREFLIGHT_SHA256: ${{ steps.contract.outputs.preflight_sha256 }}
          EXPECTED_UPDATE_SHA256: ${{ steps.contract.outputs.update_sha256 }}
        with:
          host: oracle-cloud
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          envs: EXPECTED_PREFLIGHT_SHA256,EXPECTED_UPDATE_SHA256
          script: |
            set -eu
            sudo /opt/mapleland/preflight-host.sh \
              "$EXPECTED_PREFLIGHT_SHA256" \
              "$EXPECTED_UPDATE_SHA256"

  build-and-publish:
    needs: host-preflight
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    outputs:
      image_ref: ${{ steps.published_image.outputs.image_ref }}
    env:
      IMAGE_NAME: ghcr.io/team-maple/mls-be/mapleland-api
      IMAGE_TAG: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore FCM key file
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
        run: |
          umask 077
          mkdir -p src/main/resources/firebase
          printf '%s' "$FIREBASE_KEY" \
            > src/main/resources/firebase/maple-9f1a7-firebase-adminsdk-fbsvc-7c3b6fc032.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: corretto

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew clean bootJar

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.11.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish arm64 image
        run: |
          pack build "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --path build/libs/api-0.0.1-SNAPSHOT.jar \
            --builder paketobuildpacks/builder-noble-java-tiny \
            --platform linux/arm64 \
            --publish

      - name: Resolve published manifest digest
        id: published_image
        shell: bash
        run: |
          set -euo pipefail
          image_tag="${IMAGE_NAME}:${IMAGE_TAG}"
          digest="$(docker buildx imagetools inspect "$image_tag" \
            --format '{{json .Manifest}}' | jq -er '.digest')"
          if [[ ! $digest =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "invalid published image digest" >&2
            exit 1
          fi
          docker buildx imagetools inspect "${IMAGE_NAME}@${digest}" >/dev/null
          printf 'image_ref=%s@%s\n' "$IMAGE_NAME" "$digest" >> "$GITHUB_OUTPUT"

  deploy:
    needs:
      - host-preflight
      - build-and-publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
    permissions:
      id-token: write
      contents: read
    env:
      IMAGE_REF: ${{ needs['build-and-publish'].outputs.image_ref }}

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy over Tailscale SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          EXPECTED_PREFLIGHT_SHA256: ${{ needs['host-preflight'].outputs.preflight_sha256 }}
          EXPECTED_UPDATE_SHA256: ${{ needs['host-preflight'].outputs.update_sha256 }}
        with:
          host: oracle-cloud
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          envs: EXPECTED_PREFLIGHT_SHA256,EXPECTED_UPDATE_SHA256
          script: |
            set -eu
            sudo /opt/mapleland/preflight-host.sh \
              "$EXPECTED_PREFLIGHT_SHA256" \
              "$EXPECTED_UPDATE_SHA256"
            sudo /opt/mapleland/update-api.sh \
              "${{ env.IMAGE_REF }}"
