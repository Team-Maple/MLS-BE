name: Deploy Spring Boot App to Oracle Cloud

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04-arm
    env:
      IMAGE_NAME: ghcr.io/team-maple/mls-be/mapleland-api
      IMAGE_TAG: latest-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore FCM key file
        run: |
          mkdir -p src/main/resources/firebase
          echo '${{ secrets.FIREBASE_KEY }}' > src/main/resources/firebase/maple-9f1a7-firebase-adminsdk-fbsvc-7c3b6fc032.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: corretto

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew clean bootJar

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.11.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish arm64 image
        run: |
          pack build "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --path build/libs/api-0.0.1-SNAPSHOT.jar \
            --builder paketobuildpacks/builder-noble-java-tiny \
            --platform linux/arm64 \
            --publish

  deploy:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      IMAGE_NAME: ghcr.io/team-maple/mls-be/mapleland-api
      IMAGE_TAG: latest-arm64

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy over Tailscale SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: oracle-cloud
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            /opt/mapleland/update-api.sh